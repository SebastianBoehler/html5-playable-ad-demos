<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Glow Lab Cleanse Playable Ad</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f36b8a'/%3E%3Ccircle cx='32' cy='32' r='19' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="Glow Lab Cleanse and Cream Game">
      <section id="playfield" class="playfield">
        <div class="brand-pill"><span>Glow Lab</span><strong id="phaseText">Cleanse</strong></div>
        <div class="timer-orb"><span id="timer">25</span>s</div>

        <section class="face-zone" aria-label="Drag the sponge and cream over the face">
          <div id="face" class="face">
            <div id="spotLayer" class="spot-layer"></div>
            <div id="creamLayer" class="cream-layer"></div>
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="smile"></span>
          </div>
          <div id="tool" class="tool" aria-hidden="true"></div>
        </section>

        <aside class="progress-card">
          <span id="progressLabel">Soap left</span>
          <strong id="progressValue">8</strong>
          <div class="meter"><span id="meterFill"></span></div>
        </aside>

        <p id="prompt" class="prompt">Scrub away the foam, then apply cream until coverage reaches 85%.</p>

        <div id="startScreen" class="screen">
          <p class="eyebrow">Playable skincare ad</p>
          <h1>Clean. Cream. Glow.</h1>
          <p class="copy">Drag the sponge over soap spots, then paint on Glow Lab cream.</p>
          <button id="startButton" class="primary-button" type="button">Start routine</button>
        </div>

        <div id="endScreen" class="screen hidden">
          <p class="eyebrow">Glow restored</p>
          <h2 id="rating">Skin looks fresh</h2>
          <p id="summary" class="copy"></p>
          <button id="claimButton" class="primary-button" type="button">Get cream kit</button>
          <button id="restartButton" class="secondary-button" type="button">Try again</button>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
