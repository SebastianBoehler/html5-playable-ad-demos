<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Brew Rush Catch Playable Ad</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23523b2a'/%3E%3Cpath d='M20 22h26l-4 28H24z' fill='white'/%3E%3Cpath d='M24 16h18' stroke='white' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="effects.css" />
  </head>
  <body>
    <main class="app" aria-label="Brew Rush Catch Game">
      <section id="playfield" class="playfield">
        <div class="brand-ticket">
          <span>Northstar Cold Brew</span>
          <strong id="orderName">Iced Vanilla</strong>
          <p class="next-line">Catch only: <b id="nextTarget">ICE</b></p>
          <div id="recipe" class="recipe"></div>
        </div>

        <div class="clock"><span id="timer">25</span>s</div>
        <div class="quality"><span id="qualityFill"></span></div>
        <div id="dropLayer" class="drop-layer"></div>
        <div id="splashLayer" class="splash-layer"></div>

        <div id="cup" class="cup" aria-label="Drag cup to catch ingredients">
          <span id="cupText">0</span>
        </div>

        <div id="startScreen" class="screen">
          <p class="eyebrow">Playable coffee ad</p>
          <h1>Catch the Brew</h1>
          <p class="copy">Drag the cup. Catch the green NEXT drop. Avoid every red hazard.</p>
          <button id="startButton" class="primary-button" type="button">Start rush</button>
        </div>

        <div id="endScreen" class="screen hidden">
          <p class="eyebrow">Rush complete</p>
          <h2 id="rating">Good service</h2>
          <p id="summary" class="copy"></p>
          <button id="claimButton" class="primary-button" type="button">Claim starter pack</button>
          <button id="restartButton" class="secondary-button" type="button">Play again</button>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
