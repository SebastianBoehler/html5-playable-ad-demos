<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Volt Runner Sprint Playable Ad</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23246bfe'/%3E%3Cpath d='M20 43c9-2 16-9 21-22l7 4c-3 11-8 19-16 24l12 1c5 0 8 3 8 7H12c0-8 3-12 8-14z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="ad.css" />
  </head>
  <body>
    <main class="app" aria-label="Volt Runner Sprint Game">
      <section class="game-card">
        <div class="hud" aria-live="polite">
          <div>
            <span class="hud-label">Distance</span>
            <strong><span id="score">0</span>m</strong>
          </div>
          <div>
            <span class="hud-label">Time</span>
            <strong><span id="timer">20</span>s</strong>
          </div>
        </div>

        <div id="playfield" class="playfield" aria-label="Drag to steer the runner and avoid obstacles">
          <div class="promo-strip" aria-label="Advertised product">
            <span>Volt Runner One</span>
            <strong>Test the shoe in 20s</strong>
          </div>
          <div class="road" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div id="runner" class="runner" aria-hidden="true">
            <div class="runner-head"></div>
            <div class="runner-body"></div>
            <div class="shoe left"></div>
            <div class="shoe right"></div>
          </div>
          <div id="feedbackLayer" class="feedback-layer" aria-hidden="true"></div>

          <div id="startScreen" class="screen">
            <p class="eyebrow">Gamified shoe ad</p>
            <h1>Run the Fit Test</h1>
            <p class="copy">Drag left or right. Collect patches for your shoe and avoid cones.</p>
            <button id="startButton" class="primary-button" type="button">Start run</button>
          </div>

          <div id="endScreen" class="screen hidden">
            <p class="eyebrow">Sprint complete</p>
            <h2 id="rating">Fast finish</h2>
            <p id="summary" class="copy"></p>
            <p id="offerStatus" class="offer-status" aria-live="polite"></p>
            <div class="end-actions">
              <button id="claimButton" class="primary-button" type="button">Customize pair</button>
              <button id="restartButton" class="secondary-button" type="button">Run again</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
